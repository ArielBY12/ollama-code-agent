name: Build Windows EXE

on:
  push:
    branches: [main, "feature/**", "ci/**"]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: PyInstaller on windows-latest
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run tests
        run: python -m unittest discover tests -v

      - name: Build executable
        run: pyinstaller ollama_code_agent.spec --clean --noconfirm

      - name: Smoke-test --help
        run: .\dist\ollama-code-agent.exe --help

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollama-code-agent-windows
          path: dist/ollama-code-agent.exe
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ollama-code-agent.exe
